<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧙 Wizard Sanctuary: Enemies Unveiled</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2 class="game-title">🧙‍♂️ Wizard Sanctuary: Enemies Unveiled 🔮</h2>
    
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="450"></canvas>
        <div id="crosshair"></div>
        
        <div id="ui-overlay">
            <div>❤️ HP: <span id="hp-ui">100</span></div>
            <div>⭐ Skor: <span id="score-ui">0</span></div>
        </div>
        
        <div id="wand">
            <div id="wand-tip"></div>
        </div>

        <div id="game-over">
            <h1>GAME OVER</h1>
            <p>Skor Akhir: <span id="final-score">0</span></p>
            <button id="restartBtn">Main Lagi</button>
        </div>
    </div>

    <div id="instructions">
        <strong>Kontrol:</strong><br>
        W = Maju | S = Mundur | A = Putar Kiri | D = Putar Kanan<br>
        Klik Kiri Mouse = Tembak Sihir
    </div>

<script src="game.js"></script>
</body>
</html>
