<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🧙 Wizard Sanctuary</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2 class="game-title">🧙‍♂️ Wizard Sanctuary 🔮</h2>
    
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="450"></canvas>
        <div id="crosshair"></div>
        
        <!-- UI Overlay -->
        <div id="ui-overlay">
            <div>❤️ HP: <span id="hp-ui">100</span></div>
            <div>⭐ Skor: <span id="score-ui">0</span></div>
        </div>
        
        <!-- Wand -->
        <div id="wand">
            <div id="wand-tip"></div>
        </div>

        <!-- START SCREEN -->
        <div id="start-screen" class="menu-screen">
            <h1>WIZARD SANCTUARY</h1>
            <p class="subtitle">Lawan Gerombolan Kegelapan!</p>
            <button id="startBtn" class="menu-btn">MULAI PERMAINAN</button>
        </div>

        <!-- GAME OVER -->
        <div id="game-over" class="menu-screen" style="display: none;">
            <h1>GAME OVER</h1>
            <p>Skor Akhir: <span id="final-score">0</span></p>
            <button id="restartBtn" class="menu-btn">MAIN LAGI</button>
        </div>

        <!-- MOBILE CONTROLS -->
        <div id="mobile-controls" class="mobile-only">
            <!-- Virtual Joystick -->
            <div id="joystick-area" class="joystick">
                <div id="joystick-knob" class="knob"></div>
            </div>
            
            <!-- Tombol Tembak -->
            <button id="shoot-btn" class="shoot-button">🔮<br>TEMBAK</button>
        </div>
    </div>

    <div id="instructions">
        <strong>Kontrol:</strong><br>
        W = Maju | S = Mundur | A/D = Putar<br>
        Klik Kiri = Tembak Sihir
    </div>

<script src="game.js"></script>
</body>
</html>
